name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Publish ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            rust_target: ""
            args: ""
          - name: Linux x64
            os: ubuntu-24.04
            rust_target: ""
            args: ""
          - name: macOS Intel
            os: macos-13
            rust_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - name: macOS Apple Silicon
            os: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Restore Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify release tag matches the application version
        if: github.event_name == 'push'
        run: node -e "const version=require('./package.json').version; const expected='v'+version; if (expected !== process.env.GITHUB_REF_NAME) { throw new Error('Tag '+process.env.GITHUB_REF_NAME+' does not match '+expected+'.'); }"

      - name: Build bundles and publish release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: ChudoPaint v__VERSION__
          releaseBody: Download the installer or package for your platform below.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
